name: "Nightly Hyprland x86_64 Glibc"

on:
  workflow_dispatch:

env:
  REPO_OWNER: "${{ github.repository_owner }}"
  REPO_NAME: "${{ github.event.repository.name }}"

jobs:
  build:
    name: Build Hyprland
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/void-linux/void-buildroot-${{ matrix.config.libc }}:20231230R1
      options: --platform ${{ matrix.config.platform }}
      env:
        PATH: "/usr/libexec/chroot-git:/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/sbin:/usr/local/bin:/tmp/bin"
        ARCH: "${{ matrix.config.arch }}"
        BOOTSTRAP: "${{ matrix.config.host }}"
        TEST: "${{ matrix.config.test }}"
        HOSTREPO: /hostrepo

    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              arch: x86_64,
              host: x86_64,
              libc: glibc,
              platform: linux/amd64,
              test: 1,
            }

    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          ls -la
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps
          xbps-install -Syu
          xbps-install -y tar curl

      - name: Make void pkgs directory
        run: |
          cd ~
          mkdir void-pkgs
          cd void-pkgs

      - name: Clone Void-Packages and prepare
        run: |
          git clone --depth 1 https://github.com/void-linux/void-packages.git
          ls -la

      - name: Clone Hyprland-Void repo and prepare
        run: |
          git clone https://github.com/${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}.git
          cd ${{ env.REPO_NAME }}
          cat common/shlibs >> ../void-packages/common/shlibs
          cp -r srcpkgs/* ../void-packages/srcpkgs
          cd ..

      - name: Create hostrepo and prepare masterdir
        run: |
          cd void-packages
          ln -s "$(pwd)" /hostrepo &&
          common/travis/set_mirror.sh &&
          common/travis/prepare.sh &&
          common/travis/fetch-xtools.sh


      - name: Clone all Hyprwm Repos
        run: |
          mkdir ~/repos
          cd ~/repos

          git clone --filter=tree:0 https://github.com/hyprwm/hyprcursor.git
          git clone --filter=tree:0 https://github.com/hyprwm/hypridle.git
          git clone --filter=tree:0 https://github.com/hyprwm/hyprland.git
          git clone --filter=tree:0 https://github.com/hyprwm/hyprland-protocols.git
          git clone --filter=tree:0 https://github.com/hyprwm/hyprlang.git
          git clone --filter=tree:0 https://github.com/hyprwm/hyprlock.git
          git clone --filter=tree:0 https://github.com/hyprwm/hyprpaper.git
          git clone --filter=tree:0 https://github.com/hyprwm/hyprutils.git
          git clone --filter=tree:0 https://github.com/hyprwm/xdg-desktop-portal-hyprland.git
          git clone https://github.com/Makrennel/hyprland-void.git

      - name: Create copy dirs
        run: |
          mkdir ~/oldpkgs
          mkdir -p ~/hostdir/binpkgs
          cd hyprland-void
          git checkout repository-x86_64-glibc
          cp *.xbps ~/oldpkgs
          cp *.xbps ~/hostdir/binpkgs
          cd ~/hostdir/binpkgs
          xbps-rindex -a *

      - name: Get old package times
        run: |
          cd ~/oldpkgs
          export hyprcursor_time=$(ls hyprcursor-nighty* | cut -d. -f4 | cut -d_ -f1)
          export hypridle_time=$(ls hypridle-nightly* | cut -d. -f4 | cut -d_ -f1)
          export hyprland_time=$(ls -I *-devel | grep hyprland-nightly | cut -d. -f4 | cut -d_ -f1)
          export hyprlandprotocols_time=$(ls hyprland-protocols-nightly* | cut -d. -f3 | cut -d_ -f1)
          export hyprlang_time=$(ls hyprlang-nightly* | cut -d. -f4 | cut -d_ -f1)
          export hyprlock_time=$(ls hyprlock-nightly* | cut -d. -f4 | cut -d_ -f1)
          export hyprpaper_time=$(ls hyprpaper-nightly* | cut -d. -f4 | cut -d_ -f1)
          export hyprutils_time=$(ls hyprutils-nightly* | cut -d. -f4 | cut -d_ -f1)
          export hyprwaylandscanner_time=$(ls hyprwayland-scanner-nightly* | cut -d. -f4 | cut -d_ -f1)
          export xdph_time=$(ls xdg-desktop-portal-hyprland-nightly* | cut -d. -f4 | cut -d_ -f1)

      - name: Build hyprutils
        run: |
          cd ~/repos
          cd hyprutils
          sed '/version/ s/$/.$(git show -s --format=%ct)/' ~/void-pkgs/void-packages/srcpkgs/hyprutils-nightly/template > ~/void-pkgs/void-packages/srcpkgs/hyprutils-nightly/template
          [ "$(git show -s --format=%ct)" -gt "$hyprutils_time" ] && (/hostrepo/xbps-src -j$(nproc) -s -H ~/hostdir pkg hyprutils-nightly) && rm ~/oldpkgs/hyprutils-nightly* && cp ~/hostdir/binpkgs/hyprutils-nightly* ~/oldpkgs || echo "hyprutils-nightly is up to date"
          cd ..


      - name: Build hyprlang
        run: |
          cd hyprlang
          sed '/version/ s/$/.$(git show -s --format=%ct)/' ~/void-pkgs/void-packages/srcpkgs/hyprlang-nightly/template > ~/void-pkgs/void-packages/srcpkgs/hyprlang-nightly/template
          [ "$(git show -s --format=%ct)" -gt "$hyprlang_time" ] && (/hostrepo/xbps-src -j$(nproc) -s -H ~/hostdir pkg hyprlang-nightly) && rm ~/oldpkgs/hyprlang-nightly* && cp ~/hostdir/binpkgs/hyprlang-nightly* ~/oldpkgs || echo "hyprlang-nightly is up to date"
          cd ..

      - name: Build hyprcursor
        run: |
          cd hyprcursor
          sed '/version/ s/$/.$(git show -s --format=%ct)/' ~/void-pkgs/void-packages/srcpkgs/hyprcursor-nightly/template > ~/void-pkgs/void-packages/srcpkgs/hyprcursor-nightly/template
          [ "$(git show -s --format=%ct)" -gt "$hyprcursor_time" ] && (/hostrepo/xbps-src -j$(nproc) -s -H ~/hostdir pkg hyprcursor-nightly) && rm ~/oldpkgs/hyprcursor-nightly* && cp ~/hostdir/binpkgs/hyprcursor-nightly* ~/oldpkgs || echo "hyprcursor-nightly is up to date"
          cd ..

      - name: Build hyprwayland-scanner
        run: |
          cd hyprwayland-scanner
          sed '/version/ s/$/.$(git show -s --format=%ct)/' ~/void-pkgs/void-packages/srcpkgs/hyprwayland-scanner-nightly/template > ~/void-pkgs/void-packages/srcpkgs/hyprwayland-scanner-nightly/template
          [ "$(git show -s --format=%ct)" -gt "$hyprwaylandscanner_time" ] && (/hostrepo/xbps-src -j$(nproc) -s -H ~/hostdir pkg hyprwayland-scanner-nightly) && rm ~/oldpkgs/hyprwayland-scanner-nightly* && cp ~/hostdir/binpkgs/hyprwayland-scanner-nightly* ~/oldpkgs || echo "hyprwayland-scanner-nightly is up to date"
          cd ..

      - name: Build hyprland
        run: |
          cd hyprland
          sed '/version/ s/$/.$(git show -s --format=%ct)/' ~/void-pkgs/void-packages/srcpkgs/hyprland-nightly/template > ~/void-pkgs/void-packages/srcpkgs/hyprland-nightly/template
          [ "$(git show -s --format=%ct)" -gt "$hyprland_time" ] && (/hostrepo/xbps-src -j$(nproc) -s -H ~/hostdir pkg hyprland-nightly) && rm ~/oldpkgs/hyprland-nightly* && cp ~/hostdir/binpkgs/hyprland-nightly* ~/oldpkgs || echo "hyprland-nightly is up to date"
          cd ..

      - name: Build hyprland-protocols
        run: |
          cd hyprland-protocols
          sed '/version/ s/$/.$(git show -s --format=%ct)/' ~/void-pkgs/void-packages/srcpkgs/hyprland-protocols-nightly/template > ~/void-pkgs/void-packages/srcpkgs/hyprland-protocols-nightly/template
          [ "$(git show -s --format=%ct)" -gt "$hyprlandprotocols_time" ] && (/hostrepo/xbps-src -j$(nproc) -s -H ~/hostdir pkg hyprland-protocols-nightly) && rm ~/oldpkgs/hyprland-protocols-nightly* && cp ~/hostdir/binpkgs/hyprland-protocols-nightly* ~/oldpkgs || echo "hyprland-protocols-nightly is up to date"
          cd ..

      - name: Build xdg-desktop-portal-hyprland
        run: |
          cd xdg-desktop-portal-hyprland
          sed '/version/ s/$/.$(git show -s --format=%ct)/' ~/void-pkgs/void-packages/srcpkgs/xdg-desktop-portal-hyprland-nightly/template > ~/void-pkgs/void-packages/srcpkgs/xdg-desktop-portal-hyprland-nightly/template
          [ "$(git show -s --format=%ct)" -gt "$xdph_time" ] && (/hostrepo/xbps-src -j$(nproc) -s -H ~/hostdir pkg xdg-desktop-portal-hyprland-nightly) && rm ~/oldpkgs/xdg-desktop-portal-hyprland-nightly* && cp ~/hostdir/binpkgs/xdg-desktop-portal-hyprland-nightly* ~/oldpkgs || echo "xdg-desktop-portal-hyprland-nightly is up to date"
          cd ..

      - name: Build hypridle
        run: |
          cd hypridle
          sed '/version/ s/$/.$(git show -s --format=%ct)/' ~/void-pkgs/void-packages/srcpkgs/hypridle-nightly/template > ~/void-pkgs/void-packages/srcpkgs/hypridle-nightly/template
          [ "$(git show -s --format=%ct)" -gt "$hypridle_time" ] && (/hostrepo/xbps-src -j$(nproc) -s -H ~/hostdir pkg hypridle-nightly) && rm ~/oldpkgs/hypridle-nightly* && cp ~/hostdir/binpkgs/hypridle-nightly* ~/oldpkgs || echo "hypridle-nightly is up to date"
          cd ..

      - name: Build hyprlock
        run: |
          cd hyprlock
          sed '/version/ s/$/.$(git show -s --format=%ct)/' ~/void-pkgs/void-packages/srcpkgs/hyprlock-nightly/template > ~/void-pkgs/void-packages/srcpkgs/hyprlock-nightly/template
          [ "$(git show -s --format=%ct)" -gt "$hyprlock_time" ] && (/hostrepo/xbps-src -j$(nproc) -s -H ~/hostdir pkg hyprlock-nightly) && ~/oldpkgs/hyprlock-nightly* && cp ~/hostdir/binpkgs/hyprlock-nightly* ~/oldpkgs || echo "hyprlock-nightly is up to date"
          cd ..

      - name: Build hyprpaper
        run: |
          cd hyprpaper
          sed '/version/ s/$/.$(git show -s --format=%ct)/' ~/void-pkgs/void-packages/srcpkgs/hyprpaper-nightly/template > ~/void-pkgs/void-packages/srcpkgs/hyprpaper-nightly/template
          [ "$(git show -s --format=%ct)" -gt "$hyprpaper_time" ] && (/hostrepo/xbps-src -j$(nproc) -s -H ~/hostdir pkg hyprpaper-nightly) && rm ~/oldpkgs/hyprpaper-nightly* && cp ~/hostdir/binpkgs/hyprpaper-nightly* ~/oldpkgs || echo "hyprpaper-nightly is up to date"
          cd ..

      - name: Index refreshed packages
        run: |
          cd ~/oldpkgs
          xbps-rindex -a *

      # Retrieve the signing key from the separate private repository
      - name: Retrieve private key
        run: |
          cd ~
          curl -H 'Authorization: token ${{ secrets.PEM_PAT }}' \
            -H 'Accept: application/vnd.github.v3.raw' \
            -O -L https://api.github.com/repos/${{ env.REPO_OWNER }}/hyprland-void-private-pem/contents/private.pem

      # We need to sign the packages with our private key so that they will be accepted by xbps remotely
      # See: https://docs.voidlinux.org/xbps/repositories/signing.html
      - name: Sign repository
        run: |
          export XBPS_PASSPHRASE=${{ secrets.PRIVATE_PEM_PASSPHRASE }}
          xbps-rindex --privkey ~/private.pem --sign --signedby "${{ env.REPO_NAME }}-github-action" ~/oldpkgs
          xbps-rindex --privkey ~/private.pem --sign-pkg ~/oldpkgs/*.xbps

      - name: Compress Packages
        run: |
          cd ~/oldpkgs
          tar -czvf hyprland.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPO_NAME }}
          path: ~/oldpkgs/hyprland.tar.gz

  publish:
    name: Pack and Publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.REPO_NAME }}
          path: ~/

      - name: Checkout repository
        uses: actions/checkout@v4

      # We'll blow the size of the repository up very quickly if we do not delete old iterations of the repository
      - name: Delete old repository and recreate with new packages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin -d repository-x86_64-glibc
          git switch --orphan repository-x86_64-glibc
          tar -xvf ~/hyprland.tar.gz -C ./
          git add .
          git commit -m "Upload latest packages to repository"
          git push origin repository-x86_64-glibc

